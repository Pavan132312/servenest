<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ServeNest — Worker Profile</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <nav class="navbar">
    <a class="navbar-brand" href="index.html">Serve<span>Nest</span></a>
    <div class="navbar-links" id="nav-user"></div>
  </nav>

  <div id="profile-wrap"></div>

  <!-- BOOKING MODAL -->
  <div class="modal-overlay" id="booking-modal">
    <div class="modal">
      <div class="modal-header">
        <h3>Book Worker</h3>
        <button class="modal-close" onclick="closeModal('booking-modal')">✕</button>
      </div>
      <div style="background:var(--bg); border-radius:var(--radius-sm); padding:1rem; margin-bottom:1.5rem; display:flex; gap:12px; align-items:center;">
        <div class="avatar" id="modal-avatar" style="width:44px;height:44px;font-size:16px;flex-shrink:0"></div>
        <div>
          <div style="font-weight:700" id="modal-name"></div>
          <div style="font-size:13px; color:var(--text-secondary)" id="modal-service"></div>
          <div style="font-size:13px; color:var(--primary); font-weight:600" id="modal-price"></div>
        </div>
      </div>
      <div class="form-group">
        <label>Your Name</label>
        <input type="text" id="book-name" placeholder="Full name">
      </div>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem;">
        <div class="form-group">
          <label>Date</label>
          <input type="date" id="book-date">
        </div>
        <div class="form-group">
          <label>Time</label>
          <input type="time" id="book-time">
        </div>
      </div>
      <div class="form-group">
        <label>Address</label>
        <input type="text" id="book-address" placeholder="Where the work needs to be done">
      </div>
      <div class="form-group">
        <label>Describe the Problem</label>
        <textarea id="book-problem" rows="3" placeholder="What needs to be fixed or done?"></textarea>
      </div>
      <button class="btn btn-accent" style="width:100%" onclick="confirmBooking()">Confirm Booking ✓</button>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    let worker = null;

    window.onload = function () {
      const params = new URLSearchParams(window.location.search);
      const id     = parseInt(params.get("id"));
      if (!id) { window.location.href = "index.html"; return; }

      const workers = getWorkers();
      worker = workers.find(w => w.id === id);
      if (!worker) { document.getElementById("profile-wrap").innerHTML = `<div class="page-container"><div class="empty-state"><span class="icon">😕</span><p>Worker not found.</p></div></div>`; return; }

      const reviews = getReviews().filter(r => r.workerId === worker.id);
      const currentUser = getCurrentUser();

      const today = new Date().toISOString().split("T")[0];
      document.getElementById("book-date").min   = today;
      document.getElementById("book-date").value = today;
      if (currentUser) {
        document.getElementById("book-name").value    = currentUser.name;
        document.getElementById("book-address").value = currentUser.address || "";
      }

      document.getElementById("profile-wrap").innerHTML = `
        <!-- PROFILE HERO -->
        <div class="profile-hero">
          <div class="profile-avatar" style="background:${getAvatarColor(worker.name)}">${getInitials(worker.name)}</div>
          <div class="profile-name">${worker.name}</div>
          <div class="profile-service">${worker.service} · ${worker.location}</div>
          <div class="profile-stats">
            <div class="stat">
              <div class="val">${worker.rating > 0 ? worker.rating.toFixed(1) + "★" : "New"}</div>
              <div class="lbl">Rating</div>
            </div>
            <div class="stat">
              <div class="val">${worker.reviews || 0}</div>
              <div class="lbl">Reviews</div>
            </div>
            <div class="stat">
              <div class="val">${worker.experience}</div>
              <div class="lbl">Experience</div>
            </div>
            <div class="stat">
              <div class="val">₹${worker.price}</div>
              <div class="lbl">Per Hour</div>
            </div>
          </div>
        </div>

        <!-- CONTENT -->
        <div class="page-container" style="max-width:800px">

          <!-- STATUS + BOOK -->
          <div class="card" style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:1rem; margin-bottom:1.5rem;">
            <div>
              <span class="badge ${worker.available ? 'badge-green' : 'badge-red'}" style="font-size:14px; padding:6px 14px">
                ${worker.available ? "🟢 Available Now" : "🔴 Currently Busy"}
              </span>
              ${worker.phone ? `<div style="font-size:13px; color:var(--text-secondary); margin-top:8px">📞 ${worker.phone}</div>` : ""}
            </div>
            ${worker.available
              ? `<button class="btn btn-accent btn-lg" onclick="openBooking()">Book Now →</button>`
              : `<button class="btn btn-lg" disabled style="background:var(--border);color:var(--text-muted)">Not Available</button>`}
          </div>

          <!-- ABOUT -->
          ${worker.about ? `
          <div class="card" style="margin-bottom:1.5rem">
            <div style="font-weight:700; margin-bottom:0.75rem">About</div>
            <p style="color:var(--text-secondary); font-size:14px; line-height:1.7">${worker.about}</p>
          </div>` : ""}

          <!-- REVIEWS -->
          <div style="margin-bottom:1rem">
            <h3 style="font-size:18px; font-weight:700; margin-bottom:1rem">
              Reviews (${reviews.length})
              ${worker.rating > 0 ? `<span style="color:#F39C12; font-size:16px; margin-left:8px">★ ${worker.rating.toFixed(1)}</span>` : ""}
            </h3>
            ${reviews.length
              ? reviews.reverse().map(r => `
                  <div class="review-card">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                      <div class="reviewer">${r.userName}</div>
                      <div style="color:#F39C12">${"★".repeat(r.rating)}${"☆".repeat(5 - r.rating)}</div>
                    </div>
                    <div class="review-text">${r.text}</div>
                    <div class="review-date">${formatDate(r.createdAt)}</div>
                  </div>`).join("")
              : `<div class="empty-state"><span class="icon">⭐</span><p>No reviews yet. Be the first to book and review!</p></div>`}
          </div>

          <div style="margin-top:1rem">
            <a href="javascript:history.back()" style="color:var(--text-secondary); font-size:14px;">← Back to workers</a>
          </div>
        </div>
      `;
    };

    function openBooking() {
      const currentUser = getCurrentUser();
      if (!currentUser) {
        showToast("Please login to book a worker", "error");
        setTimeout(() => window.location.href = "login.html", 1000);
        return;
      }
      if (currentUser.role !== "user") {
        showToast("Only users can book workers", "error"); return;
      }
      const av = document.getElementById("modal-avatar");
      av.textContent      = getInitials(worker.name);
      av.style.background = getAvatarColor(worker.name);
      document.getElementById("modal-name").textContent    = worker.name;
      document.getElementById("modal-service").textContent = worker.service;
      document.getElementById("modal-price").textContent   = "₹" + worker.price + "/hr";
      openModal("booking-modal");
    }

    function confirmBooking() {
      const currentUser = getCurrentUser();
      const name    = document.getElementById("book-name").value.trim();
      const date    = document.getElementById("book-date").value;
      const time    = document.getElementById("book-time").value;
      const address = document.getElementById("book-address").value.trim();
      const problem = document.getElementById("book-problem").value.trim();

      if (!name || !date || !time || !address || !problem) {
        showToast("Please fill in all fields", "error"); return;
      }

      const booking = {
        id:           generateId(),
        userId:       currentUser ? currentUser.id : "guest",
        userName:     name,
        workerId:     worker.id,
        workerName:   worker.name,
        service:      worker.service,
        price:        worker.price,
        customerName: name,
        date, time, address, problem,
        status:       "Confirmed",
        createdAt:    new Date().toISOString(),
        reviewed:     false
      };

      const bookings = getBookings();
      bookings.push(booking);
      saveBookings(bookings);
      closeModal("booking-modal");
      showToast("Booking confirmed with " + worker.name + "! 🎉");

      setTimeout(() => {
        if (currentUser) window.location.href = "user-dashboard.html";
      }, 1200);
    }
  </script>
</body>
</html>
